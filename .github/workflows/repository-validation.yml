name: Repository validation

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  static-validation:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install static validation dependencies
        run: python -m pip install pytest jsonschema PyYAML

      - name: Python syntax
        run: python -m compileall -q scripts tests

      - name: Dependency lock validation
        run: python scripts/setup/verify_dependency_lock.py

      - name: Phase A.2 patch, queue, epoch, clock, lifecycle, gate, and oracle tests
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: >-
          python -m pytest -q -p no:cacheprovider
          tests/test_px4_observability_patches.py
          tests/test_route_observability_queue.py
          tests/test_route_epoch.py
          tests/test_clock_bridge.py
          tests/test_interface_experiment_patch.py
          tests/test_route_trace_schema.py
          tests/test_route_oracle_v0.py
          tests/test_registration_lifecycle.py
          tests/test_p0d_gate_logic.py
          tests/test_route_experiment_matrices.py

      - name: JSON YAML TSV Markdown legacy and large-file audit
        env:
          PYTEST_DISABLE_PLUGIN_AUTOLOAD: "1"
          PYTHONPATH: ${{ github.workspace }}
        run: ./scripts/validation/validate_repo.sh

      # Full PX4/SITL builds and P0/P2/P3 flights intentionally remain local
      # or self-hosted tasks; this workflow uses no repository secrets.
