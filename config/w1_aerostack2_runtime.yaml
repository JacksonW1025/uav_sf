/**:
  ros__parameters:
    tf_timeout_threshold: 0.05

/**:
  platform:
    ros__parameters:
      cmd_freq: 100.0
      info_freq: 10.0
      max_thrust: 29.0
      min_thrust: 0.15
      external_odom: false
      fmu_prefix: ""
      target_system_id: 1
  state_estimator:
    ros__parameters:
      plugin_name: raw_odometry
  controller_manager:
    ros__parameters:
      plugin_name: pid_speed_controller
      cmd_freq: 100.0
      info_freq: 10.0
      use_bypass: true
  TakeoffBehavior:
    ros__parameters:
      takeoff_plugin_name: takeoff_plugin_position
  LandBehavior:
    ros__parameters:
      land_plugin_name: land_plugin_speed
  GoToBehavior:
    ros__parameters:
      go_to_plugin_name: go_to_plugin_position
      go_to_speed: 0.5
      go_to_threshold: 0.2
  FollowPathBehavior:
    ros__parameters:
      follow_path_plugin_name: follow_path_plugin_position
      follow_path_speed: 0.5
      follow_path_threshold: 0.2
