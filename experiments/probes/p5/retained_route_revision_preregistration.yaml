schema_version: "1.0"
contract:
  id: p5-retained-route-observation-v1
  version: "1.0"
  canonical_document: docs/design/RETAINED_ROUTE_OBSERVATION_CONTRACT.md
status: PREREGISTERED_BEFORE_IMPLEMENTATION
scope:
  campaign_seeded_v5: PERMANENTLY_CLOSED_NO_BACKFILL
  formal_v6_campaign: NOT_AUTHORIZED_BY_THIS_FILE
observation_kinds:
  TRANSITION:
    expected_evolution: source_route_to_distinct_target_route
  RETAINED_ROUTE:
    expected_evolution: installed_route_remains_selected
scenario_mapping:
  T1: TRANSITION
  T2: TRANSITION
  T4: TRANSITION
  T5: TRANSITION
  T6: TRANSITION
  T7: RETAINED_ROUTE
  T8: TRANSITION
t7_contract:
  action: liveness_on_setpoint_off
  expected_channels:
    heartbeat_or_health_enabled: true
    setpoint_enabled: false
  expected_route:
    family: external
    remains_selected: true
    fallback_expected: false
    mode_identity: selected_external_mode_at_window_start
    epoch_identity: route_epoch_at_window_start
    authority_source: mechanism_specific_external
    registration_identity: required_for_dynamic_external_mode
    activation_identity: required_when_emitted_by_adapter
  window:
    action_confirmation_event: channel_configuration_applied
    anchor_event: experiment_window_started
    anchor_domain: ros_node_ns
    settle_interval_ms: 500
    nominal_duration_ms: 3000
    minimum_duration_ms: 3000
    monitor_end_event:
      event_type: state_transition
      previous: OBSERVE
      current: REQUEST_HOLD
    cleanup_boundary_excluded: true
    clock_bridge_required: VALID
    endpoint_membership_policy: uncertainty_trimmed_interior_violation_boundary_ambiguity_unknown
  coverage:
    passing_verdict: COMPLETE
    require_complete_source_artifact: true
    require_route_epoch: true
    require_declared_external_route: true
    require_external_authority: true
    require_candidate_writer_coverage: true
    require_complete_writer_sequence: true
  continuity_allowance:
    minimum_gap_ms: 20
    publication_period_multiplier: 3
  applicable_clauses:
    revocation: NOT_APPLICABLE
    installation: NOT_APPLICABLE
    exclusivity: APPLICABLE
    continuity: APPLICABLE
    recovery: NOT_APPLICABLE
  violation_categories:
    - UNEXPECTED_FALLBACK
    - UNEXPECTED_ROUTE_CHANGE
    - ROUTE_RETENTION_GAP
    - AUTHORITY_CONFLICT
    - WRITER_CONFLICT
    - STALE_OR_INSUFFICIENT_EVIDENCE
acceptance:
  runner_return_code: 0
  monitor_status: PASS
  required_artifacts: [flight_log, route_trace, monitor_events, monitor_result, clock_bridge, identity]
  identity_match: true
  clock_bridge: VALID
  channel_evidence: COMPLETE
  external_route_active_at_window_start: true
  retained_window: COMPLETE
  oracle_required: true
  applicable_clause_status: PASS
  non_applicable_clause_status: NOT_APPLICABLE
missing_required_evidence: MEASUREMENT_UNKNOWN
metrics:
  transition_only_for_retained_route: null
  retained:
    - retained_window_duration_ms
    - unexpected_route_change_count
    - unexpected_fallback_count
    - maximum_unowned_window_ms
    - authority_conflict_count
    - writer_conflict_count
  not_applicable_encoding: null
revision_decisions:
  route_oracle_version: "0.4"
  route_oracle_result_schema_version: "1.3"
  route_trace_schema_version: "1.2"
  scenario_matrix_schema_version: "1.1"
  patch_change: false
  clock_bridge_change: false
  monitor_change: false
  threshold_change: false
  fallback_change: false
pilot:
  directory: runs/p5/p5_v6_candidate_t7_pilot
  mechanisms: [legacy_offboard, dynamic_external_mode]
  matched_seed: 7001
  context: turn
  maximum_environment_attempts_per_side: 3
  formal_campaign: false
