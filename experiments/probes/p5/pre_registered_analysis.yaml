schema_version: "1.1"
pair_key: [cell_id, simulation_seed, repeat]
primary_statistic: median_paired_difference
dispersion: interquartile_range
confidence_interval:
  method: paired_bootstrap
  confidence: 0.95
  resamples: 10000
adaptation:
  initial_paired_repeats: 5
  maximum_paired_repeats: 10
  increase_when_coefficient_of_variation_exceeds: 0.20
  increase_when_difference_below_combined_uncertainty: true
acceptance:
  require_validity: VALID
  require_clock_bridge: VALID
  require_critical_window: COMPLETE
  exclude_environment_failures: true
interpretation:
  measurable_difference_requires_exceeding_combined_uncertainty: true
  global_safety_ranking_forbidden: true
uncertainty_model:
  timing:
    source: per_run_clock_bridge_uncertainty
    unit: ms
  physical_resolution:
    source: conservative_locked_monitor_resolution
    altitude_loss_m: 0.01
    peak_tilt_rad: 0.001
    position_error_m: 0.01
  note: Physical quantities use same-unit resolution bounds and never inherit timing uncertainty.
metrics:
  - registration_admission_latency_ms
  - activation_latency_ms
  - failure_detection_latency_ms
  - fallback_selection_latency_ms
  - unregistration_release_latency_ms
  - reentry_latency_ms
  - first_target_consumption_ms
  - old_epoch_revocation_ms
  - target_installation_ms
  - maximum_overlap_ms
  - maximum_gap_ms
  - allocator_transition_ms
  - writer_transition_ms
  - altitude_loss_m
  - peak_tilt_rad
  - position_error_m
  - recovery_duration_ms
  - retained_window_duration_ms
  - unexpected_route_change_count
  - unexpected_fallback_count
  - maximum_unowned_window_ms
  - authority_conflict_count
  - writer_conflict_count
metric_applicability:
  TRANSITION:
    retained_window_duration_ms: NOT_APPLICABLE
    unexpected_route_change_count: NOT_APPLICABLE
    unexpected_fallback_count: NOT_APPLICABLE
    maximum_unowned_window_ms: NOT_APPLICABLE
    authority_conflict_count: NOT_APPLICABLE
    writer_conflict_count: NOT_APPLICABLE
  RETAINED_ROUTE:
    registration_admission_latency_ms: NOT_APPLICABLE
    activation_latency_ms: NOT_APPLICABLE
    failure_detection_latency_ms: NOT_APPLICABLE
    fallback_selection_latency_ms: NOT_APPLICABLE
    unregistration_release_latency_ms: NOT_APPLICABLE
    reentry_latency_ms: NOT_APPLICABLE
    first_target_consumption_ms: NOT_APPLICABLE
    old_epoch_revocation_ms: NOT_APPLICABLE
    target_installation_ms: NOT_APPLICABLE
    maximum_overlap_ms: NOT_APPLICABLE
    maximum_gap_ms: NOT_APPLICABLE
    allocator_transition_ms: NOT_APPLICABLE
    writer_transition_ms: NOT_APPLICABLE
    recovery_duration_ms: NOT_APPLICABLE
not_applicable_encoding: null
