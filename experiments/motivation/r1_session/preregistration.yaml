schema_version: "1.0"
status: FROZEN_BEFORE_FORMAL_ATTEMPTS
study_id: r1_session_isolation
created_at: 2026-07-20T00:00:00-07:00
freeze_mechanism: >-
  The first pushed Git commit containing this file freezes R1 source and binary
  identity, Oracle and schema, selected completion semantic, old/new identity
  rules, event order, timing and safety bounds, admissibility rules, cleanup,
  seeds, and attempt caps before every formal R1 attempt.

execution_gate:
  preregistration_commit_must_be_pushed: true
  required_remote: origin/main
  formal_run_before_push: FORBIDDEN
  formal_attempts_completed_at_freeze: 0
  stop_after_preregistration_checkpoint: true

namespace:
  preregistration: experiments/motivation/r1_session/preregistration.yaml
  matrix: experiments/motivation/r1_session/matrix.yaml
  ledger: experiments/motivation/r1_session/attempt_ledger.yaml
  raw_runs: runs/motivation/r1_session
  raw_artifacts_are_ignored: true
  semantic_audit: docs/motivation/R1_SESSION_SEMANTIC_AUDIT.md
  oracle_design: docs/design/SESSION_ROLLOVER_ORACLE.md
  oracle_executable: scripts/oracles/session_rollover_oracle.py
  result_schema: data/schemas/session_rollover_result.schema.json

research_question: >-
  Determine whether a newly registered and activated local External Mode
  instance remains isolated from lifecycle state belonging to an earlier local
  instance under clean release, local process restart, and the preregistered
  completion-session isolation check.

