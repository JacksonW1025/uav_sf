  install_base: runs/r1_harness_build/install

environment:
  vehicle: gz_x500
  world: default
  setpoint: zero_velocity_Trajectory
  setpoint_rate_hz: 20
  old_component_and_new_component: locally_owned_test_processes
  transport_scope: local_SITL_namespace_only
  external_systems: NONE

selected_r1_c_semantic: ModeCompleted
selected_semantic_wire_fields: [timestamp, result, nav_state]
selected_semantic_instance_or_generation_fields: []
selected_semantic_delivery: >-
  One completion value associated by the harness with the earlier local
  producer session is held locally and delivered once through the normal
  /fmu/in/mode_completed SITL interface only after the new registered/activated
  session and its executor completion wait have been observed.
additional_delayed_semantics: FORBIDDEN

contract:
  classification: B
  name: implied_ownership_and_progression_contract
  explicit_registration_generation_guarantee: false
  rationale: >-
    ModeCompleted is documented as published by an active mode and is consumed
    by an active scheduled-mode wait, establishing implied lifecycle ownership;
    the message and receiver match contain no registration-instance or
    activation-generation identifier.
  acceptance_of_earlier_completion_is_automatically_a_bug: false

identity_rules:
  registration_identity:
    - public_request_id
    - correlated_public_reply_request_id
    - harness_registration_instance_id
    - assigned_mode_id_observation
    - assigned_executor_id_observation
  activation_identity:
    - producer_session_id
    - harness_registration_instance_id
    - per_process_activation_count
  producer_session_identity: explicit_unique_old_and_new_harness_strings
  route_identity: PX4_route_epoch_id
  mode_or_executor_numeric_slot_reuse: ALLOWED_AND_NOT_A_SESSION_ID
  required_relation: >-
    request IDs, registration-instance IDs, producer-session IDs, and composite
    activation keys are all complete and distinct between old and new.
  missing_old_or_new_identity: UNKNOWN
  complete_non_distinct_relation: NOT_APPLICABLE

event_order:
  R1-A:
    - old_register
    - old_activate
    - stabilize_old_for_at_least_1_second
    - legal_local_SIGTERM_and_destructor_unregistration
    - observe_exit_and_fallback
    - wait_at_least_500_ms
    - new_start_and_register
    - new_activate_and_establish_executor_owner
    - stabilize_new_for_at_least_1_second
    - observe_isolation_window_for_at_least_1500_ms
    - cleanup
  R1-B:
    - old_register
    - old_activate
    - stabilize_old_for_at_least_1_second
    - stop_old_local_component_with_SIGKILL
    - observe_configured_PX4_fallback
    - wait_at_least_500_ms
    - new_start_and_register
    - new_activate_and_establish_executor_owner
    - stabilize_new_for_at_least_1_second
    - observe_isolation_window_for_at_least_1500_ms
    - cleanup
  R1-C:
    - old_register
    - old_activate
    - stabilize_old_for_at_least_1_second
    - associate_and_hold_exactly_one_successful_ModeCompleted_with_old_session
    - legal_local_SIGTERM_and_destructor_unregistration
    - observe_exit_and_fallback
    - wait_at_least_500_ms
    - new_start_register_activate_and_arm_completion_wait
    - stabilize_new_for_at_least_1_second
    - release_held_completion_exactly_once
    - observe_progression_and_lineage_for_at_least_1500_ms
    - cleanup

timing_bounds:
  runner_timeout_s: 150
  minimum_clock_bridge_samples: 20
  clock_bridge_status: VALID
  complete_window_inside_clock_bridge_interval: true
  old_stabilization_minimum_s: 1.0
  post_fallback_wait_minimum_s: 0.5
  new_stabilization_minimum_s: 1.0
  completion_release_count_R1_C: 1
  post_release_or_control_observation_minimum_s: 1.5
  timing_sweep: FORBIDDEN

observation_requirements:
  - old_and_new_registration_request_reply_identity
  - old_and_new_activation_identity
  - old_and_new_producer_session_identity
  - source_and_target_route_epoch
  - completion_generation_provenance_R1_C
  - completion_release_and_relay_observation_R1_C
  - executor_lifecycle_progression
  - successor_request_and_successor_installation_when_progression_occurs
  - controller_lineage
  - allocator_input_lineage
  - final_writer_lineage
  - Land_and_Disarm_cleanup

oracle:
  name: Session Rollover Oracle
  version: "0.1"
  result_schema_version: "1.0"
  statuses: [PASS, EXPOSURE, VIOLATION, UNKNOWN, NOT_APPLICABLE]
  PASS: >-
    The new session remains isolated and all applicable lifecycle obligations
    hold.
  EXPOSURE: >-
    The public message contract lacks sufficient instance identity, creating a
    measurable lifecycle-ambiguity window, but no explicit or clearly
    established contract violation is proved.
  VIOLATION: >-
    Complete evidence shows that the earlier session changes the current
    session lifecycle or successor in contradiction to the implied ownership
    contract, or another explicit registration/route obligation is contradicted.
  UNKNOWN: >-
    Required old/new identity, timing, route, lifecycle, successor, lineage, or
    cleanup evidence is incomplete.
  NOT_APPLICABLE: >-
    Complete evidence does not establish the required old/new session relation.
  incomplete_evidence_dominates_provisional_finding: true

formal_matrix:
  scenarios: [R1-A, R1-B, R1-C]
  accepted_runs_per_scenario: 3
  accepted_target: 9
  maximum_attempts_per_scenario: 6
  maximum_total_attempts: 18
  stop_when_all_scenario_targets_reached_or_relevant_cap_reached: true
  seeds_are_frozen_in: experiments/motivation/r1_session/matrix.yaml

accepted_run:
  admissible_oracle_outcomes: [PASS, EXPOSURE, VIOLATION]
  requirements:
    - preregistration_commit_already_pushed_to_origin_main
    - repository_worktree_clean_and_locked_hashes_match_at_attempt_start
    - runner_exit_zero_and_monitor_PASS
    - exact_scenario_event_order_and_preconditions_observed
    - complete_window_with_VALID_clock_bridge_and_at_least_20_samples
    - complete_old_new_identity_route_lifecycle_and_lineage_evidence
    - Oracle_has_no_UNKNOWN_applicable_clause
    - cleanup_landed_and_disarmed
    - no_physical_safety_bound_exceeded
  PASS_EXPOSURE_or_VIOLATION_is_an_outcome_not_an_attempt_classification: true

attempt_classification:
  accepted: ACCEPTED
  observability_rejected: OBSERVABILITY_REJECTED
  measurement_insufficient: MEASUREMENT_INSUFFICIENT
  environment_failure: ENVIRONMENT_FAILURE
  campaign_configuration_failure: CAMPAIGN_CONFIGURATION_FAILURE
  formal_safety_stop: FORMAL_SAFETY_STOP
  not_applicable: NOT_APPLICABLE
  UNKNOWN_is_not_accepted: true
  no_infinite_retry: true

physical_safety_bounds:
  maximum_attitude_excursion_deg: 45.0
  maximum_angular_rate_excursion_rad_s: 3.0
  unexpected_ground_contact_before_cleanup: FORMAL_SAFETY_STOP
  simulator_clock_stall: FORMAL_SAFETY_STOP
  PX4_abort: FORMAL_SAFETY_STOP

cleanup:
  command: public_VehicleCommand_RTL
  required_terminal_state: LANDED_AND_DISARMED
  incomplete_cleanup_or_cleanup_evidence: UNKNOWN_AND_ATTEMPT_REJECTED
  locally_owned_processes_terminated: true
  local_DDS_UDP_port_8888_free: true

