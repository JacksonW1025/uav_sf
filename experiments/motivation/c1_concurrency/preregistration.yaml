event_pairs:
  A:
    event_a: external_activation
    event_b: gcs_commanded_Hold
    precondition: armed_airborne_Hold_with_registered_inactive_External
    legal_final_by_order:
      A_FIRST: [AUTO_LOITER_nav_state_4]
      NEAR_SIMULTANEOUS: [AUTO_LOITER_nav_state_4, registered_External]
      B_FIRST: [registered_External]
  B:
    event_a: external_completion
    event_b: manual_or_GCS_takeover_Hold
    precondition: armed_airborne_active_External
    legal_final_by_order:
      A_FIRST: [AUTO_LOITER_nav_state_4]
      NEAR_SIMULTANEOUS: [AUTO_LOITER_nav_state_4]
      B_FIRST: [AUTO_LOITER_nav_state_4]
  C:
    event_a: locally_owned_external_process_termination_SIGKILL
    event_b: GCS_RTL_request
    precondition: armed_airborne_active_External
    legal_final_by_order:
      A_FIRST: [AUTO_RTL_nav_state_5]
      NEAR_SIMULTANEOUS: [AUTO_RTL_nav_state_5]
      B_FIRST: [AUTO_RTL_nav_state_5]
  D:
    event_a: automatic_fallback_installation_after_health_reply_pause
    event_b: rapid_legal_External_reentry_request
    precondition: armed_airborne_active_External_then_public_health_reply_pause
    legal_final_by_order:
      A_FIRST: [registered_External]
      NEAR_SIMULTANEOUS: [AUTO_RTL_nav_state_5, registered_External]
      B_FIRST: [AUTO_RTL_nav_state_5]
  E:
    event_a: legal_External_release_via_local_SIGTERM
    event_b: failsafe_clear_via_health_reply_resumption
    precondition: automatic_RTL_fallback_installed_after_public_health_reply_pause
    legal_final_by_order:
      A_FIRST: [AUTO_RTL_nav_state_5]
      NEAR_SIMULTANEOUS: [AUTO_RTL_nav_state_5]
      B_FIRST: [AUTO_RTL_nav_state_5]

relative_timing:
