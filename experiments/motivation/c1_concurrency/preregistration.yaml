    - local_DDS_UDP_port_8888_unoccupied
    - runner_exit_zero
    - monitor_PASS
    - no_simulator_clock_stall_or_PX4_abort
    - cleanup_landed_and_disarmed
  scenario:
    - both_registered_pair_events_observed_exactly_once
    - relative_timing_matches_registered_slot
    - pair_specific_precondition_satisfied
    - final_snapshot_captured_before_cleanup
    - no_ground_contact_before_cleanup
  observability:
    - clock_bridge_VALID_and_covers_complete_pair_window
    - complete_controller_allocator_writer_lineage
    - authority_oracle_has_no_UNKNOWN_applicable_clause
    - raw_ULog_and_compact_processed_trace_present

