formal_acceptance_gate:
  identity:
    - preregistration_commit_is_pushed_before_attempt
    - worktree_clean_at_attempt_start
    - harness_source_hashes_match_locked_artifacts
    - binary_hashes_match_locked_binaries
    - dependency_commits_match_source_revisions
    - observation_patch_and_logger_hashes_match
    - protected_P5_v6_and_Issue_162_hashes_match
  environment:
    - no_preexisting_px4_gazebo_probe_or_agent_process
    - DDS_udp_port_8888_unoccupied
    - runner_exit_zero
    - monitor_status_PASS
    - environment_status_VALID
    - no_simulator_clock_stall
    - vehicle_lands_and_disarms_during_cleanup
  observability:
    - clock_bridge_status_VALID
    - every_cross_domain_marker_inside_bridge_valid_interval
    - pre_fault_baseline_COMPLETE
    - controller_allocator_writer_lineage_complete
    - required_raw_ulog_and_compact_trace_present
    - physical_metrics_recovery_metrics_and_full_post_fault_metrics_separate
    - freshness_oracle_status_not_UNKNOWN_or_NOT_APPLICABLE
    - route_oracle_has_complete_applicable_clause_evidence
  total_process_stop:
    - producer_stopped
    - pre_revocation_target_COMPLETE
    - fallback_window_COMPLETE
    - health_loss_observed_within_deadline
    - automatic_fallback_declared_and_installed
  setpoint_only_stall:
    - producer_setpoint_channel_stopped
    - target_window_is_at_least_3_monotonic_seconds
    - pre_revocation_target_COMPLETE
    - fallback_window_POLICY_TERMINATED
    - every_target_request_has_a_matching_health_reply
    - no_health_loss_or_automatic_fallback_in_target_window
    - external_route_retained_at_target_end
    - no_ground_contact_in_target_window

interpretation_rules:
  TOTAL_PROCESS_STOP: >-
    Retained-command use before health-driven fallback is adjudicated as design
    exposure unless another explicit contract is violated.
  SETPOINT_ONLY_STALL: >-
    Health-alive route retention and retained-command influence in the complete
    bounded window are adjudicated as exposure unless route attribution, an
    explicit deadline, or cleanup/recovery contract is violated.
  route_oracle_rule: Route Oracle PASS does not erase a Freshness exposure.
  physical_window_rule: >-
    The formal physical consequence clause uses only fault-to-automatic-fallback
    installation for TOTAL_PROCESS_STOP and fault-to-target-window-end for
    SETPOINT_ONLY_STALL.
  recovery_rule: >-
    Recovery and explicit-cleanup consequences are reported separately and
    never combined with the formal pre-revocation exposure clause.
  expected_status_without_other_contract_failure: EXPOSURE

formal_cells:
  - cell_id: F1
    setpoint_type: TRAJECTORY
    fault_type: TOTAL_PROCESS_STOP
    accepted_runs_required: 3
    maximum_total_attempts: 6
  - cell_id: F2
    setpoint_type: ATTITUDE
    fault_type: TOTAL_PROCESS_STOP
    accepted_runs_required: 3
    maximum_total_attempts: 6
  - cell_id: F3
    setpoint_type: RATE
    fault_type: TOTAL_PROCESS_STOP
    accepted_runs_required: 3
    maximum_total_attempts: 6
  - cell_id: F4
    setpoint_type: RATE
    fault_type: SETPOINT_ONLY_STALL
    accepted_runs_required: 3
    maximum_total_attempts: 6

attempt_rules:
  batch_scope: one_formal_cell_per_batch
  accepted_target_per_cell: 3
  maximum_attempts_per_cell: 6
  maximum_total_accepted_runs: 12
  unique_attempt_id_required: true
  preserve_every_attempt: true
  threshold_change_after_first_formal_accepted_run: FORBIDDEN
  tuning_runs_count_in_denominator: false
  environment_and_observability_failures_count_as_accepted: false
  complete_natural_PASS_EXPOSURE_or_VIOLATION_may_be_accepted: true
  stop_cell_when: three_accepted_or_six_total_attempts
  commit_and_push_before_next_cell: true

attempt_classification:
  accepted: ACCEPTED_FORMAL
  environment_failure: ENVIRONMENT_FAILURE
  observability_failure: REJECTED_OBSERVABILITY
  configuration_failure: CAMPAIGN_CONFIGURATION_FAILURE
  target_safety_stop: FORMAL_SAFETY_STOP
